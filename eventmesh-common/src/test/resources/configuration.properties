eventMesh.server.env=env-succeed!!!
eventMesh.server.idc=idc-succeed!!!
eventMesh.sysid=816
eventMesh.server.cluster=cluster-succeed!!!
eventMesh.server.name=name-succeed!!!
eventMesh.server.hostIp=hostIp-succeed!!!
eventMesh.storage.plugin.type=storage-succeed!!!
eventMesh.security.plugin.type=security-succeed!!!
eventMesh.metaStorage.plugin.type=metaStorage-succeed!!!
eventMesh.trace.plugin=trace-succeed!!!
eventMesh.metrics.plugin=metrics-succeed1!!!,metrics-succeed2!!!,metrics-succeed3!!!
eventMesh.metaStorage.plugin.server-addr=server-addr-succeed1!!!

eventMesh.server.security.enabled=true
eventMesh.metaStorage.plugin.enabled=true
eventMesh.server.trace.enabled=true

eventMesh.server.provide.protocols=TCP,HTTP,GRPC
eventMesh.metaStorage.plugin.username=username-succeed!!!
eventMesh.metaStorage.plugin.password=password-succeed!!!

# Unified Runtime: Connector Runtime
eventMesh.connector.plugin.config.path=conf/connectors-test/
eventMesh.connector.thread.pool.size=8
eventMesh.connector.max.retry=5
eventMesh.connector.max.count=32
eventMesh.connector.pool.mode=SHARED
eventMesh.connector.verify.enabled=true

# Unified Runtime: Admin Server
eventMesh.admin.server.enabled=true
eventMesh.admin.server.required=true
eventMesh.admin.server.address=admin-test:9090
eventMesh.admin.server.registry.type=nacos
eventMesh.admin.server.heartbeat.interval.seconds=10
eventMesh.admin.server.monitor.report.interval.seconds=60

# Unified Runtime: Offset Management
eventMesh.offset.local.enabled=true
eventMesh.offset.local.path=data/offset-test/
eventMesh.offset.remote.enabled=true
eventMesh.offset.remote.sync.interval.seconds=120

# Unified Runtime: Pipeline
eventMesh.pipeline.ingress.filters=auth,ratelimit,protocol,rule,acl,sizelimit
eventMesh.pipeline.ingress.transformers=protocol,enrichment,fieldmapping
eventMesh.pipeline.egress.filters=acl,sizelimit,protocol
eventMesh.pipeline.egress.transformers=protocol,compression
eventMesh.pipeline.dlq.enabled=true
eventMesh.pipeline.dlq.topic=test-dlq
eventMesh.pipeline.trace.enabled=true

# Unified Runtime: FilePersistentOffsetStore
eventMesh.file.offset.store.flush.interval.seconds=15

# Unified Runtime: A2A
eventMesh.a2a.enabled=true
eventMesh.a2a.gateway.port=9090
eventMesh.a2a.registry.ttl.seconds=60
eventMesh.a2a.sse.max.connections=500
